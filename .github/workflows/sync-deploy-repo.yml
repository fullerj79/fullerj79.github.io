name: Sync enhanced_artifacts to Render deploy repo

on:
  push:
    branches: ["main"]
    paths:
      - "enhanced_artifacts/**"
      - ".github/workflows/sync-deploy-repo.yml"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Publish enhanced_artifacts to deploy repo
        uses: s0/git-publish-subdir-action@v2.6.0
        env:
          REPO: ${{ secrets.DEPLOY_REPO }}
          BRANCH: main
          FOLDER: enhanced_artifacts
          GITHUB_TOKEN: ${{ secrets.DEPLOY_REPO_TOKEN }}
          MESSAGE: "Deploy: {sha}"
